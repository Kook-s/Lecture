spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:tcp://localhost/~/lecture
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
